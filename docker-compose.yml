services:

  # ── MongoDB ─────────────────────────────────────────────────────
  mongodb:
    image: mongo:7-jammy
    # Port intentionally not exposed to host — only backend needs it
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5

  # ── Backend ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
    env_file:
      # Loads GNEWS_API_KEY (and any other secrets); MONGODB_URI above takes precedence
      - ./backend/.env
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend (nginx + Vite SPA) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongo_data:
